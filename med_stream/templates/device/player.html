{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Device Player - {{ device.name }}</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: Arial, sans-serif;
            }
            .player-header {
                position: fixed;
                width: 100%;
                padding: 12px 16px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: linear-gradient(90deg, #09101b, #121a29);
                min-height: 64px;
                gap: 16px;
            }
            .player-header-left {
                flex: 1;
                min-width: 0;
                overflow: hidden;
            }
            .player-header .device-meta {
                color: #9fb0c8;
                margin-left: 8px;
                font-size: 0.95rem;
            }
            .marquee-wrap {
                width: 100%;
                overflow: hidden;
                white-space: nowrap;
                position: relative;
                padding: 6px 0;
            }

            .marquee-text {
                display: inline-block;
                white-space: nowrap;
                padding-left: 100%;
                font-size: 1rem;
                font-weight: 600;
                color: #fff;
                animation: marquee 20s linear infinite;
            }

            @keyframes marquee {
                0% {
                    transform: translateX(0);
                }
                100% {
                    transform: translateX(-100%);
                }
            }
        </style>
    </head>
    <body>
        {% now "U" as cache_bust %}
        <div class="player-shell">
            <div class="player-header">
                <div id="player-marquee" class="marquee-wrap">
                    <span class="marquee-text" id="player-marquee-text">
                        {{ off_duty_text }}
                    </span>
                </div>
            </div>
            <div id="player-stage" class="stage">
                <div class="placeholder">No media command received yet.</div>
            </div>
        </div>

        <script src="{% static 'js/devices/player_image.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_video.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_audio.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_pdf.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_html.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player.js' %}?v={{ cache_bust }}"
                data-device-id="{{ device.id }}"
                data-device-type="{{ device.device_type|default:'TV'|escapejs }}"
                data-device-orientation="{{ device.orientation|default:'LANDSCAPE'|escapejs }}"
                defer>
        </script>
    </body>
</html>
