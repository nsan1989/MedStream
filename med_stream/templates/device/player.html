{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Device Player - {{ device.name }}</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: Arial, sans-serif;
            }
            .player-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 20px;
                background: linear-gradient(90deg, #09101b, #121a29);
                min-height: 64px;
                gap: 16px;
            }
            .player-header-left {
                flex: 1;
                min-width: 0;
                overflow: hidden;
            }
            .player-header .device-meta {
                color: #9fb0c8;
                margin-left: 8px;
                font-size: 0.95rem;
            }
            .marquee-wrap {
                overflow: hidden;
                white-space: nowrap;
                width: 100%;
                box-sizing: border-box;
                padding: 10px 0;
            }
            .marquee-text {
                display: inline-block;
                padding-left: 100%;
                animation: marquee 14s linear infinite;
                color: #fff;
                font-weight: 600;
                letter-spacing: 0.02em;
            }
            @keyframes marquee {
                0% { transform: translateX(0); }
                100% { transform: translateX(-100%); }
            }
        </style>
    </head>
    <body>
        <div class="player-shell">
            <div class="player-header">
                <div class="player-header-left">
                    <div id="player-device-info">
                        Device: <strong>{{ device.name }}</strong>
                        <span class="device-meta">
                            {{ device.get_device_type_display }} ·
                            {{ device.get_orientation_display }} ·
                            {{ device.resolution_width }}×{{ device.resolution_height }}
                        </span>
                    </div>
                    <div id="player-marquee" class="marquee-wrap" style="display:none;">
                        <span class="marquee-text" id="player-marquee-text"></span>
                    </div>
                </div>
                <div id="player-status" class="status">Waiting for command...</div>
            </div>
            <div id="player-stage" class="stage">
                <div class="placeholder">No media command received yet.</div>
            </div>
        </div>

        <script src="{% static 'js/devices/player_image.js' %}"></script>
        <script src="{% static 'js/devices/player_video.js' %}"></script>
        <script src="{% static 'js/devices/player_audio.js' %}"></script>
        <script src="{% static 'js/devices/player_pdf.js' %}"></script>
        <script src="{% static 'js/devices/player_html.js' %}"></script>
        <script src="{% static 'js/devices/player.js' %}"
                data-device-id="{{ device.id }}"
                data-device-type="{{ device.device_type|default:'TV'|escapejs }}"
                data-device-orientation="{{ device.orientation|default:'LANDSCAPE'|escapejs }}"
                defer>
        </script>
    </body>
</html>
