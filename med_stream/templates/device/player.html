{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Device Player - {{ device.name }}</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: Arial, sans-serif;
                overflow: hidden;
            }
            .player-shell {
                width: 100vw;
                height: 100vh;
            }
            .split-layout {
                display: grid;
                grid-template-columns: minmax(0, 1.35fr) minmax(0, 0.65fr);
                width: 100%;
                height: 100%;
            }
            .split-layout.fullscreen {
                display: block;
            }

            .split-layout.fullscreen .media-pane {
                width: 100%;
                height: 100%;
            }

            .split-layout.fullscreen .content-pane {
                display: none;
            }

            .split-layout.split {
                display: grid;
                grid-template-columns: minmax(0, 1.35fr) minmax(0, 0.65fr);
            }
            .pane {
                height: 100%;
                overflow: hidden;
                box-sizing: border-box;
                position: relative;
            }
            .media-pane {
                background: #0b0f14;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .content-pane {
                background: linear-gradient(135deg, #111827, #1f2937);
                padding: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .placeholder {
                font-size: 1.2rem;
                color: #9fb0c8;
                text-align: center;
                padding: 24px;
            }
            .content-slide {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 14px;
                animation: fadeIn 0.35s ease;
            }
            .content-title {
                font-size: 1.25rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: #9fb0c8;
            }
            .content-body {
                font-size: 1.45rem;
                line-height: 1.45;
                font-weight: 600;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .content-meta {
                font-size: 0.95rem;
                color: #9fb0c8;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(8px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body>
        {% now "U" as cache_bust %}
        
        <!--
        <div class="player-shell">
            <div class="player-header">
                <div id="player-marquee" class="marquee-wrap">
                    <span class="marquee-text" id="player-marquee-text">
                        {{ off_duty_text }}
                    </span>
                </div>
            </div>
            
            <div id="player-stage" class="stage">
                <div class="placeholder">No media command received yet.</div>
            </div>
        </div>
        -->

        <div id="player-layout" class="split-layout">
            <div id="media-pane" class="pane media-pane"></div>
            <div id="content-pane" class="pane content-pane"></div>
        </div>

        <script src="{% static 'js/devices/player_image.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_video.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_audio.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_pdf.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player_html.js' %}?v={{ cache_bust }}"></script>
        <script src="{% static 'js/devices/player.js' %}?v={{ cache_bust }}"
                data-device-id="{{ device.id }}"
                data-device-type="{{ device.device_type|default:'TV'|escapejs }}"
                data-device-orientation="{{ device.orientation|default:'LANDSCAPE'|escapejs }}"
                defer>
        </script>
    </body>
</html>
