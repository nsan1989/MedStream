{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Device Player - {{ device.name }}</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: Arial, sans-serif;
            }
            .player-shell {
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 100%;
            }
            .player-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.5rem 0.75rem;
                background: #111;
                border-bottom: 1px solid #222;
                font-size: 0.9rem;
            }
            .device-meta {
                margin-left: 0.75rem;
                font-size: 0.8rem;
                color: #bbb;
            }
            .status {
                color: #9ad39a;
            }
            .stage {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
                overflow: hidden;
            }
            body.device-kiosk .player-shell {
                background: #0f1115;
            }
            body.device-led-wall .player-shell {
                background: #000;
            }
            body.device-led-wall .status {
                color: #ffe28a;
            }
            body.device-tv .status {
                color: #9ad39a;
            }
            body.portrait .stage {
                align-items: flex-start;
            }
            .stage img,
            .stage video,
            .stage audio,
            .stage iframe {
                max-width: 100%;
                max-height: 100%;
            }
            .stage .placeholder {
                color: #888;
                font-size: 1rem;
            }
        /* Schedule carousel styles */
            .schedule-carousel {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            .schedule-slides {
                display: flex;
                width: 100%;
                height: 100%;
                transition: transform 0.5s ease;
            }
            .schedule-slide {
                min-width: 100%;
                padding: 1.25rem;
                box-sizing: border-box;
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
            }
            .carousel-nav {
                position: absolute;
                top: 50%;
                left: 0;
                right: 0;
                transform: translateY(-50%);
                display: flex;
                justify-content: space-between;
                pointer-events: none;
            }
            .carousel-button {
                pointer-events: auto;
                background: rgba(0,0,0,0.45);
                border: 0;
                color: #fff;
                padding: 0.4rem 0.6rem;
                margin: 0 0.5rem;
                cursor: pointer;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <div class="player-shell">
            <div class="player-header">
                <div>
                    Device: <strong>{{ device.name }}</strong>
                    <span class="device-meta">
                        {{ device.get_device_type_display }} ·
                        {{ device.get_orientation_display }} ·
                        {{ device.resolution_width }}×{{ device.resolution_height }}
                    </span>
                </div>
                <div id="player-status" class="status">Waiting for command...</div>
            </div>
            <div id="player-stage" class="stage">
                <div class="placeholder">No media command received yet.</div>
            </div>
        </div>

        <script src="{% static 'js/devices/player_image.js' %}"></script>
        <script src="{% static 'js/devices/player_video.js' %}"></script>
        <script src="{% static 'js/devices/player_audio.js' %}"></script>
        <script src="{% static 'js/devices/player_pdf.js' %}"></script>
        <script src="{% static 'js/devices/player_html.js' %}"></script>
        <script src="{% static 'js/devices/player.js' %}"
                data-device-id="{{ device.id }}"
                data-device-type="{{ device.device_type|default:'TV'|escapejs }}"
                data-device-orientation="{{ device.orientation|default:'LANDSCAPE'|escapejs }}"
                defer>
        </script>
    </body>
</html>
