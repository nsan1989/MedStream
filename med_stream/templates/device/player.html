{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Device Player - {{ device.name }}</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: #000;
                color: #fff;
                font-family: Arial, sans-serif;
            }
            .player-shell {
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 100%;
            }
            .player-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.5rem 0.75rem;
                background: #111;
                border-bottom: 1px solid #222;
                font-size: 0.9rem;
            }
            .device-meta {
                margin-left: 0.75rem;
                font-size: 0.8rem;
                color: #bbb;
            }
            .status {
                color: #9ad39a;
            }
            .stage {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
                overflow: hidden;
            }
            body.device-kiosk .player-shell {
                background: #0f1115;
            }
            body.device-led-wall .player-shell {
                background: #000;
            }
            body.device-led-wall .status {
                color: #ffe28a;
            }
            body.device-tv .status {
                color: #9ad39a;
            }
            body.portrait .stage {
                align-items: flex-start;
            }
            .stage img,
            .stage video,
            .stage audio,
            .stage iframe {
                max-width: 100%;
                max-height: 100%;
            }
            .stage .placeholder {
                color: #888;
                font-size: 1rem;
            }
        /* Schedule carousel styles */
            .schedule-carousel {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
            .schedule-slides {
                display: flex;
                width: 100%;
                height: 100%;
                transition: transform 0.5s ease;
            }
            .schedule-slide {
                min-width: 100%;
                padding: 1.25rem;
                box-sizing: border-box;
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
            }
            .carousel-nav {
                position: absolute;
                top: 50%;
                left: 0;
                right: 0;
                transform: translateY(-50%);
                display: flex;
                justify-content: space-between;
                pointer-events: none;
            }
            .carousel-button {
                pointer-events: auto;
                background: rgba(0,0,0,0.45);
                border: 0;
                color: #fff;
                padding: 0.4rem 0.6rem;
                margin: 0 0.5rem;
                cursor: pointer;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <div class="player-shell">
            <div class="player-header">
                <div>
                    Device: <strong>{{ device.name }}</strong>
                    <span class="device-meta">
                        {{ device.get_device_type_display }} ·
                        {{ device.get_orientation_display }} ·
                        {{ device.resolution_width }}×{{ device.resolution_height }}
                    </span>
                </div>
                <div id="player-status" class="status">Waiting for command...</div>
            </div>
            <div id="player-stage" class="stage">
                <div class="placeholder">No media command received yet.</div>
            </div>
        </div>

        <script src="{% static 'js/devices/player_image.js' %}"></script>
        <script src="{% static 'js/devices/player_video.js' %}"></script>
        <script src="{% static 'js/devices/player_audio.js' %}"></script>
        <script src="{% static 'js/devices/player_pdf.js' %}"></script>
        <script src="{% static 'js/devices/player_html.js' %}"></script>

        <script>
            const deviceId = "{{ device.id }}";
            const deviceType = "{{ device.device_type|default:'TV'|escapejs }}";
            const deviceOrientation = "{{ device.orientation|default:'LANDSCAPE'|escapejs }}";
            let lastCommandId = null;
            let playlistTimer = null;

            const statusNode = document.getElementById("player-status");
            const stageNode = document.getElementById("player-stage");

            const deviceTypeClass = `device-${deviceType.toLowerCase().replace(/_/g, "-")}`;
            document.body.classList.add(deviceTypeClass);
            document.body.classList.add(deviceOrientation.toLowerCase());

            function setStatus(text, isError = false) {
                statusNode.textContent = text;
                statusNode.style.color = isError ? "#ff9999" : "#9ad39a";
            }

            function applyDeviceSettings() {
                if (deviceType === "LED_WALL") {
                    stageNode.style.background = "#000";
                } else if (deviceType === "KIOSK") {
                    stageNode.style.background = "#12151c";
                }
                if (deviceOrientation === "PORTRAIT") {
                    stageNode.style.justifyContent = "center";
                }
            }

            applyDeviceSettings();

            function absoluteUrl(rawUrl) {
                if (!rawUrl) return "";
                try {
                    return new URL(rawUrl, window.location.origin).toString();
                } catch (e) {
                    return rawUrl;
                }
            }

            function clearStage() {
                if (playlistTimer) {
                    clearInterval(playlistTimer);
                    playlistTimer = null;
                }
                stageNode.innerHTML = "";
            }

            async function sendAck(commandId, status, message) {
                try {
                    await fetch(`/device/player/${deviceId}/ack/`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            command_id: commandId,
                            status: status,
                            message: message
                        })
                    });
                } catch (error) {
                    console.error("Ack failed:", error);
                }
            }

            function renderMedia(mediaType, fileUrl, loop = false) {
                clearStage();

                const absUrl = absoluteUrl(fileUrl);
                if (!absUrl) {
                    stageNode.innerHTML = '<div class="placeholder">Missing media URL.</div>';
                    return;
                }

                const type = (mediaType || "").toUpperCase();
                const isKiosk = deviceType === "KIOSK";
                const isLedWall = deviceType === "LED_WALL";

                if (type === "IMAGE") {
                    renderImage(absUrl, isLedWall);
                    return;
                }

                if (type === "VIDEO") {
                    renderVideo(absUrl, isKiosk, loop);
                    return;
                }

                if (type === "AUDIO") {
                    renderAudio(absUrl, isKiosk, loop);
                    return;
                }

                if (type === "PDF") {
                    renderPdf(absUrl);
                    return;
                }

                if (type === "HTML") {
                    renderHtml(absUrl);
                    return;
                }

                stageNode.innerHTML = '<div class="placeholder">Unsupported media type.</div>';
            }

            function renderPlaylist(items, loop = false) {
                clearStage();

                if (!items || !items.length) {
                    stageNode.innerHTML = '<div class="placeholder">Playlist has no items.</div>';
                    return;
                }

                let index = 0;
                let playlistLoop = Boolean(loop);

                function showCurrentItem() {
                    const item = items[index];
                    renderMedia(item.media_type, item.file_url, playlistLoop);
                    setStatus(`Playing playlist item ${index + 1} of ${items.length}`);
                    const durationSeconds = Number(item.duration || 10);
                    const waitMs = Math.max(1, durationSeconds) * 1000;

                    if (playlistTimer) {
                        clearTimeout(playlistTimer);
                    }
                    if (playlistLoop || index < items.length - 1) {
                        playlistTimer = setTimeout(() => {
                            index = (index + 1) % items.length;
                            showCurrentItem();
                        }, waitMs);
                    }
                }

                showCurrentItem();
            }

            async function pollCommand() {
                try {
                    const response = await fetch(`/device/player/${deviceId}/next-command/`);
                    const data = await response.json();

                    if (!data.command_id || !data.payload || !data.payload.command) {
                        return;
                    }

                    if (data.command_id === lastCommandId) {
                        return;
                    }

                    lastCommandId = data.command_id;
                    const payload = data.payload;

                    if (payload.command !== "PLAY") {
                        return;
                    }

                    const loop = Boolean(payload.loop);

                    if (payload.source_type === "MEDIA_ASSET") {
                        renderMedia(payload.media_type, payload.file_url, loop);
                        setStatus(
                            `Playing media: ${payload.title || "Untitled"}` +
                            (loop ? " (looping)" : "")
                        );
                        await sendAck(data.command_id, "PLAYING", "Media playback started");
                        return;
                    }

                    if (payload.source_type === "PLAYLIST") {
                        renderPlaylist(payload.items || [], loop);
                        setStatus(
                            `Playing playlist: ${payload.playlist_name || "Untitled"}` +
                            (loop ? " (looping)" : "")
                        );
                        await sendAck(data.command_id, "PLAYING", "Playlist playback started");
                        return;
                    }

                    if (payload.source_type === "DOCTOR_SCHEDULE") {
                        clearStage();

                        const doctorName = payload.doctor_name || "Unknown doctor";
                        const doctorDay = payload.doctor_schedule_day || "Unknown day";
                        const doctorStart = payload.doctor_schedule_start || "--:--";
                        const doctorEnd = payload.doctor_schedule_end || "--:--";
                        const specialization = payload.specialization || "--:--";

                        const wrapper = document.createElement("div");
                        wrapper.className = "schedule-slide";

                        wrapper.innerHTML = `
                            <h2 style="margin-bottom:1rem;">Doctor Schedule</h2>
                            <div style="font-size:1.6rem; font-weight:bold;">
                                ${doctorName}
                            </div>
                            ${
                                specialization
                                    ? `<div style="margin-top:0.5rem; color:#bbb;">
                        ${specialization}
                        </div>`
                                    : ""
                            }
                            <div style="margin-top:1rem; font-size:1.2rem;">
                                ${doctorDay}
                            </div>
                            <div style="font-size:1.3rem;">
                                ${doctorStart} - ${doctorEnd}
                            </div>
                        `;

                        stageNode.appendChild(wrapper);
                        setStatus(`Displaying doctor schedule: ${doctorName}`);
                        await sendAck(data.command_id, "PLAYING", "Doctor schedule displayed");
                        return;
                    }

                    if (payload.source_type === "OPD_SCHEDULE") {
                        clearStage();

                        const opdRoomName = payload.opd_room_name || "Unknown OPD room";
                        const opdDay = payload.opd_schedule_day || "Unknown day";
                        const opdStart = payload.opd_schedule_start || "--:--";
                        const opdEnd = payload.opd_schedule_end || "--:--";
                        const department = payload.department_name || "";

                        const wrapper = document.createElement("div");
                        wrapper.className = "schedule-slide";

                        wrapper.innerHTML = `
                            <h2 style="margin-bottom:1rem;">OPD Schedule</h2>
                            <div style="font-size:1.6rem; font-weight:bold;">
                                ${opdRoomName}
                            </div>
                            ${
                                department
                                    ? `<div style="margin-top:0.5rem; color:#bbb;">
                        ${department}
                        </div>`
                                    : ""
                            }
                            <div style="margin-top:1rem; font-size:1.2rem;">
                                ${opdDay}
                            </div>
                            <div style="font-size:1.3rem;">
                                ${opdStart} - ${opdEnd}
                            </div>
                        `;

                        stageNode.appendChild(wrapper);

                        setStatus(`Displaying OPD schedule: ${opdRoomName}`);
                        await sendAck(
                            data.command_id,
                            "PLAYING",
                            "OPD schedule started"
                        );
                        return;
                    }

                    setStatus("Unknown source type", true);
                } catch (error) {
                    console.error(error);
                    setStatus("Polling error", true);
                }
            }

            pollCommand();
            setInterval(pollCommand, 5000);
        </script>
    </body>
</html>
