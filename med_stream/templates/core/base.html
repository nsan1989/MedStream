{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}MedStream{% endblock %}</title>
        <style>
            html, body { margin: 0; padding: 0; }
            .layout-wrapper { display: flex; min-height: 100vh; width: 100%; }
            .sidebar-wrapper { flex-shrink: 0; }
            .main-content { flex: 1; min-width: 0; padding: 1rem; }
        </style>
        <link rel="icon" href="{% static 'icons/favicon.jpeg' %}">

        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
        <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
        <link
            rel="preload"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            as="style"
            onload="this.onload=null;this.rel='stylesheet'"
            crossorigin="anonymous"
        >
        <noscript>
            <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
                rel="stylesheet"
                crossorigin="anonymous"
            >
        </noscript>

        <link
            rel="preload"
            href="{% static 'css/common/style.css' %}"
            as="style"
            onload="this.onload=null;this.rel='stylesheet'"
        >
        <noscript><link rel="stylesheet" href="{% static 'css/common/style.css' %}"></noscript>
        <link
            rel="preload"
            href="{% static 'css/core/base.css' %}"
            as="style"
            onload="this.onload=null;this.rel='stylesheet'"
        >
        <noscript><link rel="stylesheet" href="{% static 'css/core/base.css' %}"></noscript>

        <!--Google fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

        {% block extra_css %}{% endblock %}
    </head>
    <body>
        <div class="message-wrapper">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">
                        <span class="mb-2">{{message}}</span>
                        <button
                            class="btn btn-warning"
                            type="button"
                            onclick="this.parentElement.style.display='none'"
                        >
                            ok
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        {% block content %}{% endblock %}
        {% block extra_js %}{% endblock %}
    </body>
</html>
