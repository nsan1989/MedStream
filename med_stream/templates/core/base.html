{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}MedStream{% endblock %}</title>
        <style>
            html, body { margin: 0; padding: 0; }
            body { font-family: "Segoe UI", Roboto, Arial, sans-serif; }
            .layout-wrapper { display: flex; min-height: 100vh; width: 100%; }
            .sidebar-wrapper { flex-shrink: 0; }
            .main-content { flex: 1; min-width: 0; padding: 1rem; }
        </style>
        <link rel="icon" href="{% static 'icons/favicon.jpeg' %}">

        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
        <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
        <link
            rel="preload"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            as="style"
            crossorigin="anonymous"
        >
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            media="print"
            onload="this.media='all'"
            crossorigin="anonymous"
        >
        <noscript>
            <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
                rel="stylesheet"
                crossorigin="anonymous"
            >
        </noscript>

        <link rel="preload" href="{% static 'css/common/style.css' %}" as="style">
        <link rel="stylesheet" href="{% static 'css/common/style.css' %}" media="print" onload="this.media='all'">
        <noscript><link rel="stylesheet" href="{% static 'css/common/style.css' %}"></noscript>

        <link rel="preload" href="{% static 'css/core/base.css' %}" as="style">
        <link rel="stylesheet" href="{% static 'css/core/base.css' %}" media="print" onload="this.media='all'">
        <noscript><link rel="stylesheet" href="{% static 'css/core/base.css' %}"></noscript>

        {% block extra_css %}{% endblock %}
    </head>
    <body>
        <div class="message-wrapper">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">
                        <span class="mb-2">{{message}}</span>
                        <button
                            class="btn btn-warning"
                            type="button"
                            onclick="this.parentElement.style.display='none'"
                        >
                            ok
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        {% block content %}{% endblock %}
        {% block extra_js %}{% endblock %}
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </body>
</html>
